; =============================================================================
; Printimate Firmware — PlatformIO Configuration
; =============================================================================
; This file is the single source of truth for the firmware build environment.
; Every team member gets identical toolchain, framework, and library versions
; by virtue of this file being committed to the repo.
;
; If you change anything here (especially versions), note it in the commit
; message so the team knows to rebuild their .pio cache if needed.
; =============================================================================

[platformio]
default_envs = dev
src_dir = src
include_dir = include

; -----------------------------------------------------------------------------
; Shared settings — inherited by every [env:*] below via `extends`.
; -----------------------------------------------------------------------------
[env]
platform = espressif32@6.9.0
board = esp32doit-devkit-v1
framework = arduino

; Custom partition layout (see partitions.csv).
; Gives us two ~1.875 MB OTA slots plus NVS, a small LittleFS, and coredump.
board_build.partitions = partitions.csv

; Serial port configuration.
; 115200 is the de facto default for ESP32 and works reliably with the CP2102.
; Upload at 921600 for speed; drop to 460800 if you see flash errors.
monitor_speed = 115200
upload_speed = 921600

; Pretty-print serial output: translate ESP32 panic addresses into file:line
; and strip ANSI color codes for log files.
monitor_filters =
    esp32_exception_decoder
    colorize
    time

; Third-party libraries. Pin minor versions with ^ to get bug fixes without
; surprise API breaks. Bump intentionally.
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0
    ESP32Async/ESPAsyncWebServer@^3.6.0

; -----------------------------------------------------------------------------
; Development build — verbose logs, assertions on, no optimization hiding bugs.
; This is the default environment. Use this day-to-day.
; -----------------------------------------------------------------------------
[env:dev]
build_type = debug
build_flags =
    -DCORE_DEBUG_LEVEL=4                 ; DEBUG; bump to 5 for VERBOSE
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DBOARD_HAS_PSRAM=0                  ; DevKit V1 has no PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0          ; DevKit V1 uses CP2102, not native USB
    -DPRINTIMATE_FIRMWARE_VERSION=\"0.1.0-dev\"
    -DPRINTIMATE_BUILD_ENV=\"dev\"

; -----------------------------------------------------------------------------
; Production build — minimal logs, optimized. Use this for release/demo builds.
; -----------------------------------------------------------------------------
[env:prod]
build_type = release
build_flags =
    -DCORE_DEBUG_LEVEL=1                 ; ERROR only
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DPRINTIMATE_FIRMWARE_VERSION=\"0.1.0\"
    -DPRINTIMATE_BUILD_ENV=\"prod\"
