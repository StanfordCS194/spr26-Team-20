; =============================================================================
; Printimate Firmware — PlatformIO Configuration
; =============================================================================
; This file is the single source of truth for the firmware build environment.
; Every team member gets identical toolchain, framework, and library versions
; by virtue of this file being committed to the repo.
;
; If you change anything here (especially versions), note it in the commit
; message so the team knows to rebuild their .pio cache if needed.
; =============================================================================

[platformio]
default_envs = dev
src_dir = src
include_dir = include

; -----------------------------------------------------------------------------
; Shared settings — inherited by every [env:*] below via `extends`.
; -----------------------------------------------------------------------------
[env]
; NOTE: We use the pioarduino fork of platform-espressif32 rather than the
; upstream PlatformIO `espressif32` package. Reason: the upstream package
; (as of 6.9.x) has been falling behind on arduino-esp32 updates, and ships
; a version with a known bug that releases the BLE controller memory before
; WiFiProv can use it on classic ESP32 (only — the bug doesn't repro on S3
; or C3, or via Arduino IDE). Symptom is `simple_ble_start enable controller
; failed 259` followed by the entire BLE stack failing to come up. See:
;   https://github.com/espressif/arduino-esp32/issues/8176
;   https://github.com/espressif/arduino-esp32/pull/11167
; pioarduino tracks the upstream Espressif core more closely and has the fix.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32doit-devkit-v1
framework = arduino

; Custom partition scheme (see partitions.csv).
; Heads up: enabling BLE provisioning pulls in Bluedroid + protocomm, which
; adds ~400-500 KB to the binary. Our app slots are 1.875 MB so this fits
; with comfortable headroom, but if you ever see "Sketch too big," check
; `pio run -v` output for the actual binary size and consider stripping
; BLE Classic (we only need BLE LE) or moving to NimBLE.
board_build.partitions = partitions.csv

; Serial port configuration.
; 115200 is the de facto default for ESP32 and works reliably with the CP2102.
; Upload at 921600 for speed; drop to 460800 if you see flash errors.
monitor_speed = 115200
upload_speed = 921600

; Pretty-print serial output: translate ESP32 panic addresses into file:line
; and strip ANSI color codes for log files.
monitor_filters =
    esp32_exception_decoder
    colorize
    time

; Third-party libraries. Pin minor versions with ^ to get bug fixes without
; surprise API breaks. Bump intentionally.
;
; Note on libs we're NOT using:
;   - ESPAsyncWebServer: not needed since we provision over BLE, not HTTP.
;     If a future feature needs an on-device web UI (LAN fallback mode per
;     PRD F6), add it back here.
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0

; -----------------------------------------------------------------------------
; Development build — verbose logs, assertions on, no optimization hiding bugs.
; This is the default environment. Use this day-to-day.
; -----------------------------------------------------------------------------
[env:dev]
build_type = debug
build_flags =
    -DCORE_DEBUG_LEVEL=4                 ; DEBUG; bump to 5 for VERBOSE
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DBOARD_HAS_PSRAM=0                  ; DevKit V1 has no PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0          ; DevKit V1 uses CP2102, not native USB
    -DPRINTIMATE_FIRMWARE_VERSION=\"0.1.0-dev\"
    -DPRINTIMATE_BUILD_ENV=\"dev\"
    -DPRINTIMATE_BUILD_ENV_IS_DEV        ; gates credential logging in provisioning.cpp

; -----------------------------------------------------------------------------
; Production build — minimal logs, optimized. Use this for release/demo builds.
; -----------------------------------------------------------------------------
[env:prod]
build_type = release
build_flags =
    -DCORE_DEBUG_LEVEL=1                 ; ERROR only
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DPRINTIMATE_FIRMWARE_VERSION=\"0.1.0\"
    -DPRINTIMATE_BUILD_ENV=\"prod\"
