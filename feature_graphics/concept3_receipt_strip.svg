<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="500" fill="#0a0a0a"/>
  <!-- Wide horizontal receipt -->
  <g transform="translate(60, 130)">
    <!-- Top/bottom edges horizontal sides of paper -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="904" y1="0" x2="904" y2="240" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Torn top -->
    <polyline points="0,0 16,-16 32,0 48,-16 64,0 80,-16 96,0 112,-16 128,0 144,-16 160,0 176,-16 192,0 208,-16 224,0 240,-16 256,0 272,-16 288,0 304,-16 320,0 336,-16 352,0 368,-16 384,0 400,-16 416,0 432,-16 448,0 464,-16 480,0 496,-16 512,0 528,-16 544,0 560,-16 576,0 592,-16 608,0 624,-16 640,0 656,-16 672,0 688,-16 704,0 720,-16 736,0 752,-16 768,0 784,-16 800,0 816,-16 832,0 848,-16 864,0 880,-16 896,0 904,-4" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Torn bottom -->
    <polyline points="0,240 16,256 32,240 48,256 64,240 80,256 96,240 112,256 128,240 144,256 160,240 176,256 192,240 208,256 224,240 240,256 256,240 272,256 288,240 304,256 320,240 336,256 352,240 368,256 384,240 400,256 416,240 432,256 448,240 464,256 480,240 496,256 512,240 528,256 544,240 560,256 576,240 592,256 608,240 624,256 640,240 656,256 672,240 688,256 704,240 720,256 736,240 752,256 768,240 784,256 800,240 816,256 832,240 848,256 864,240 880,256 896,240 904,244" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Dashed lines -->
    <line x1="0" y1="34" x2="904" y2="34" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.5"/>
    <line x1="0" y1="50" x2="904" y2="50" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.5"/>
    <line x1="0" y1="190" x2="904" y2="190" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.5"/>
    <line x1="0" y1="206" x2="904" y2="206" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.5"/>
    <!-- Smiley left -->
    <g transform="translate(150, 70)">
      <circle cx="0" cy="50" r="50" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="-18" cy="38" r="5" fill="#ffffff"/>
      <circle cx="18" cy="38" r="5" fill="#ffffff"/>
      <path d="M-22 60 Q0 82 22 60" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Wordmark right of smiley, inside the receipt -->
    <text x="280" y="142" fill="#ffffff" font-family="-apple-system, system-ui, 'Segoe UI', Helvetica, sans-serif" font-size="92" font-weight="500" letter-spacing="-1.5">printimate</text>
  </g>
</svg>
